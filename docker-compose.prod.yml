# Produção na VPS — use: docker compose -f docker-compose.prod.yml up -d --build
services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_HTTP_PORT:-80}:80"
    env_file:
      - .env
    environment:
      DB_HOST: db
    volumes:
      # Código do host (git pull atualiza sem rebuild)
      - .:/var/www/html
      - ./storage:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?defina MYSQL_ROOT_PASSWORD no .env}
      MYSQL_DATABASE: ${DB_NAME:-clinix}
      MYSQL_USER: ${DB_USER:-clinix}
      MYSQL_PASSWORD: ${DB_PASS:?defina DB_PASS no .env}
    volumes:
      - clinix_db:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 30s

volumes:
  clinix_db:
